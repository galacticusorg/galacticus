groups:
  dmoSubhalos:
    title: Dark matter-only subhalos
    description: Generic dark matter-only subhalo benchmarks and validations.
    nav_order: 10
  symphonyCDM:
    title: Symphony CDM Milky Way
    description: Dark matter-only subhalos calibrated against the Symphony Milky Way
      zoom-in suite.
    citation: Nadler et al. (2023)
    citation_url: https://ui.adsabs.harvard.edu/abs/2023ApJ...945..159N
    nav_order: 20
  cozmicWDM:
    title: COZMIC WDM Milky Way
    description: Dark matter-only subhalos in warm dark matter cosmologies, calibrated
      against the COZMIC suite.
    citation: Nadler et al. (2025); An et al. (2025)
    citation_url: https://ui.adsabs.harvard.edu/abs/2025ApJ...986..127N
    nav_order: 30
  decayingDM:
    title: Decaying dark matter subhalos
    description: Dark matter-only subhalos in two-body decaying dark matter cosmologies.
    citation: Nadler & Benson (2025)
    citation_url: https://ui.adsabs.harvard.edu/abs/2025arXiv250112636N
    nav_order: 40
  idealizedSubhalos:
    title: Idealized subhalo simulations
    description: Idealized subhalo evolution under controlled tidal stripping.
    citation: Du et al. (2024)
    citation_url: https://ui.adsabs.harvard.edu/abs/2024arXiv240309597D
    nav_order: 50
  milkyWayModel:
    title: Milky Way model
    description: Full Milky Way galaxy formation model.
    nav_order: 60
  convergence:
    title: Convergence tests
    description: Numerical convergence checks of internal Galacticus algorithms.
    nav_order: 70
  strongLensing:
    title: Strong lensing
    description: Subhalo populations relevant to strong gravitational lensing measurements.
    nav_order: 80
  baryonicSuppression:
    title: Baryonic suppression
    description: Suppression of structure growth by baryonic physics.
    nav_order: 90
  meta:
    title: Build metrics
    description: Compilation profiling and other build-time diagnostics.
    nav_order: 100
