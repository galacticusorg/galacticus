name: Build Galacticus build environment on MacOS

runs:
  using: 'composite'
  steps:
    - name: "Set environmental variables"
      shell: bash
      run: |
        os_ver=$(sw_vers -productVersion)
        IFS='.' read -r -a ver <<< "$os_ver"
        echo "OS_VER=${ver[0]}" >> $GITHUB_ENV
        echo "GALACTICUS_EXEC_PATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
        echo "GALACTICUS_DATA_PATH=$GITHUB_WORKSPACE/datasets" >> $GITHUB_ENV
        echo "PATH=$PATH:/opt/local/bin:/usr/local/bin" >> $GITHUB_ENV
        echo "GALACTICUS_EXEC_PATH=`pwd`" >> $GITHUB_ENV
        echo "FCCOMPILER=gfortran-16" >> $GITHUB_ENV
        echo "CCOMPILER=gcc-16" >> $GITHUB_ENV
        echo "CPPCOMPILER=g++-16" >> $GITHUB_ENV
        echo "BUILDPATH=./work/build" >> $GITHUB_ENV
        if [[ "${ver[0]}" -eq 13 ]]; then
          # For MacOS 13 force use of the classic linker as the new linker does not support the '-commons' option - see https://trac.macports.org/ticket/68194#comment:15
          echo "GALACTICUS_FCFLAGS=$GALACTICUS_FCFLAGS -fintrinsic-modules-path /usr/local/finclude -fintrinsic-modules-path /usr/local/include -fintrinsic-modules-path /usr/local/include/gfortran -fintrinsic-modules-path /usr/local/lib/gfortran/modules -L/usr/local/lib -L/opt/local/lib -Wl,-ld_classic" >> $GITHUB_ENV
        else
          echo "GALACTICUS_FCFLAGS=$GALACTICUS_FCFLAGS -fintrinsic-modules-path /usr/local/finclude -fintrinsic-modules-path /usr/local/include -fintrinsic-modules-path /usr/local/include/gfortran -fintrinsic-modules-path /usr/local/lib/gfortran/modules -L/usr/local/lib -L/opt/local/lib" >> $GITHUB_ENV
        fi
        echo "GALACTICUS_CFLAGS=-I/usr/local/include -I/opt/local/include" >> $GITHUB_ENV
        echo "GALACTICUS_CPPFLAGS=-I/usr/local/include -I/opt/local/include -I/usr/local/include/libqhullcpp" >> $GITHUB_ENV
    - name: Fix broken Apple include file
      shell: bash
      run: |
        # This removes syntax not supported by the GCC compiler prior to version 13.3.
        # It should be possible to remove this once a later version of GCC is used.
        # See https://gcc.gnu.org/bugzilla/show_bug.cgi?id=114007
        if [[ "${OS_VER}" -ge 14 ]]; then
           sudo sed -E -i~ s/"clang::"/"clang"/g /Library/Developer/CommandLineTools/SDKs/MacOSX${OS_VER}.sdk/usr/include/sys/cdefs.h
        fi
    - name: Install MacPorts
      shell: bash
      run: |
        if [[ "${OS_VER}" -eq 11 ]]; then
           macportsversion=2.7.1
           macportsbase=2.7.1-11-BigSur
        elif [[ "${OS_VER}" -eq 12 ]]; then
           macportsversion=2.9.1
           macportsbase=2.9.1-12-Monterey
        elif [[ "${OS_VER}" -eq 13 ]]; then
           macportsversion=2.9.1
           macportsbase=2.9.1-13-Ventura
        elif [[ "${OS_VER}" -eq 14 ]]; then
           macportsversion=2.9.1
           macportsbase=2.9.1-14-Sonoma
        elif [[ "${OS_VER}" -eq 15 ]]; then
           macportsversion=2.11.6
           macportsbase=2.11.6-15-Sequoia
        else
           echo Unknown MacOS version: ${os_ver}
           exit 1
        fi
        curl -L --fail --retry 5 --retry-all-errors --retry-max-time 120 https://github.com/macports/macports-base/releases/download/v${macportsversion}/MacPorts-${macportsbase}.pkg --output MacPorts-${macportsbase}.pkg
        sudo installer -pkg ./MacPorts-${macportsbase}.pkg -target /
        rm ./MacPorts-${macportsbase}.pkg
    - name: Install GCC 16 (gcc/g++/gfortran)
      shell: bash
      run: |
        # Refresh the formula index first: the runner image ships an older
        # `gcc` (e.g. 15.2.0) and a stale tap that reports it as current, so a
        # bare `brew install gcc` is a no-op and no `gcc-16` binary appears.
        brew update
        brew install gcc
        brew upgrade gcc
    - name: Install guile
      shell: bash
      run: |
        sudo port install guile-3.0
        sudo port select --set guile guile-3.0
    - name: Install libgit2
      shell: bash
      run: sudo port install libgit2
    - name: Install libmatheval
      shell: bash
      run: |
        curl -L --fail --retry 5 --retry-all-errors --retry-max-time 120 https://github.com/galacticusorg/libmatheval/releases/download/latest/libmatheval-1.1.13.tar.gz --output libmatheval-1.1.13.tar.gz
        tar xvfz libmatheval-1.1.13.tar.gz
        cd libmatheval-1.1.13
        # Patch following the approach used in MacPorts (https://github.com/macports/macports-ports/tree/master/math/libmatheval).
        sed -E -i~ s/"#undef HAVE_SCM_T_BITS"/"#define HAVE_SCM_T_BITS 1"/ config.h.in
        # Set guile paths following the approach used in MacPorts (https://github.com/macports/macports-ports/tree/master/math/libmatheval).
        CC=${CCOMPILER} PKG_CONFIG=/opt/local/bin/pkg-config GUILE=/opt/local/bin/guile-3.0 GUILE_CONFIG=/opt/local/bin/guile-config-3.0 GUILE_TOOLS=/opt/local/bin/guile-tools-3.0 ./configure --prefix=/usr/local || (cat config.log && false)
        make -j3
        sudo make install
        cd ..
        rm -rf libmatheval-1.1.13.tar.gz libmatheval-1.1.13
    - name: Install qhull
      shell: bash
      run: |
        curl -L --fail --retry 5 --retry-all-errors --retry-max-time 120 http://www.qhull.org/download/qhull-2020-src-8.0.2.tgz --output qhull-2020-src-8.0.2.tgz
        tar xvfz qhull-2020-src-8.0.2.tgz
        cd qhull-2020.2
        make -j3 CC=${CCOMPILER} CXX=${CPPCOMPILER}
        sudo make install
        cd ..
        rm -rf qhull-2020-src-8.0.2.tgz qhull-2020.2
    - name: Install GSL
      shell: bash
      run: |
        curl -L --fail --retry 5 --retry-all-errors --retry-max-time 120 ftp://ftp.gnu.org/gnu/gsl/gsl-2.6.tar.gz --output gsl-2.6.tar.gz
        tar xvfz gsl-2.6.tar.gz
        cd gsl-2.6
        CC=${CCOMPILER} ./configure --prefix=/usr/local
        make -j3
        sudo make install
        cd ..
        rm -rf gsl-2.6 gsl-2.6.tar.gz
    - name: Install HDF5
      shell: bash
      run: |
        curl -L --fail --retry 5 --retry-all-errors --retry-max-time 120 https://support.hdfgroup.org/releases/hdf5/v1_14/v1_14_5/downloads/hdf5-1.14.5.tar.gz --output hdf5-1.14.5.tar.gz
        tar -vxzf hdf5-1.14.5.tar.gz 
        cd hdf5-1.14.5
        if [[ "${OS_VER}" -eq 13 ]]; then
           # For MacOS 13 force use of the classic linker as the new linker does not support the '-commons' option - see https://trac.macports.org/ticket/68194#comment:15
           CC=${CCOMPILER} CXX=${CPPCOMPILER} FC=${FCCOMPILER} LDFLAGS=-Wl,-ld_classic ./configure --prefix=/usr/local --enable-fortran --enable-build-mode=production
        else
           CC=${CCOMPILER} CXX=${CPPCOMPILER} FC=${FCCOMPILER}                         ./configure --prefix=/usr/local --enable-fortran --enable-build-mode=production
        fi
        make -j3
        sudo make install
        cd ..
        rm -rf hdf5-1.14.5 hdf5-1.14.5.tar.gz
    - name: Install FoX
      shell: bash
      run: |
        curl -L --fail --retry 5 --retry-all-errors --retry-max-time 120 https://github.com/andreww/fox/archive/refs/tags/4.1.0.tar.gz --output FoX-4.1.0.tar.gz
        tar xvfz FoX-4.1.0.tar.gz
        cd fox-4.1.0
        FC=${FCCOMPILER} ./configure --prefix=/usr/local
        make -j3
        sudo make install
        cd ..
        rm -rf fox-4.1.0 FoX-4.1.0.tar.gz
    - name: Install FFTW3
      shell: bash
      run: |
        curl -L --fail --retry 5 --retry-all-errors --retry-max-time 120 ftp://ftp.fftw.org/pub/fftw/fftw-3.3.4.tar.gz --output fftw-3.3.4.tar.gz
        tar xvfz fftw-3.3.4.tar.gz
        cd fftw-3.3.4
        F77=${FCCOMPILER} CC=${CCOMPILER} ./configure --prefix=/usr/local
        make -j4
        sudo make install
        cd ..
        rm -rf fftw-3.3.4 fftw-3.3.4.tar.gz
    - name: Install ANN
      shell: bash
      run: |
        curl -L --fail --retry 5 --retry-all-errors --retry-max-time 120 https://www.cs.umd.edu/~mount/ANN/Files/1.1.2/ann_1.1.2.tar.gz --output ann_1.1.2.tar.gz
        tar xvfz ann_1.1.2.tar.gz
        cd ann_1.1.2
        sed -E -i~ "s|C\+\+ = g\+\+|C\+\+ = $CPPCOMPILER|" Make-config
        sed -E -i~ "s|CFLAGS = \-O3|CFLAGS = \-O3 \-std=gnu\+\+17|" Make-config
        make macosx-g++
        sudo cp bin/* /usr/local/bin/.
        sudo cp lib/* /usr/local/lib/.
        sudo cp -R include/* /usr/local/include/.
