name: Notarize-MacOS
on:
  workflow_dispatch:
  schedule:
    - cron: '0 15,17,19,21,23 * * 1-5'
jobs:
  Poll-Notarization:
    runs-on: macos-15-intel
    permissions:
      contents: write
    concurrency:
      group: notarizeMacOS-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          ref: master
      - run: echo "The ${{ github.repository }} repository has been cloned to the runner."
      - name: Poll pending macOS notarization requests
        id: poll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.MACOS_APP_SPECIFIC_PASSWORD }}
        run: |
          python3 ./scripts/aux/notarizationRetrieve.py
          echo "overall_status=$(python3 -c "import json; print(json.load(open('notarization-poll-result.json'))['status'])")" >> "$GITHUB_OUTPUT"
          {
            echo "details<<EOF"
            python3 -c "import json; print(json.load(open('notarization-poll-result.json'))['details'])"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Report notarization status to Slack
        if: >
          steps.poll.outputs.overall_status == 'pending' ||
          steps.poll.outputs.overall_status == 'success' ||
          steps.poll.outputs.overall_status == 'failure'
        env:
          SLACK_WEBHOOK_STATUS_URL: ${{ secrets.SLACK_WEBHOOK_STATUS_URL }}
          NOTARIZATION_STATUS: ${{ steps.poll.outputs.overall_status }}
          NOTARIZATION_DETAILS: ${{ steps.poll.outputs.details }}
          NOTARIZATION_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NOTARIZATION_REPOSITORY: ${{ github.repository }}
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE/python python3 scripts/aux/notarizationStatus.py
      - name: Mark notarization as reported
        if: >
          steps.poll.outputs.overall_status == 'success' ||
          steps.poll.outputs.overall_status == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo '{"reported": true}' > "notarization-complete-${SHA}.json"
          gh release upload bleeding-edge "notarization-complete-${SHA}.json" --clobber
      - name: Fail on notarization failure
        if: steps.poll.outputs.overall_status == 'failure'
        run: |
          echo "Notarization status is failure."
          exit 1
      - run: echo "This job's status is ${{ job.status }}."
