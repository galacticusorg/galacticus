name: SLOC-Report
on:
  workflow_dispatch:
  schedule:
    - cron: '01 15 01 * *'
permissions:
  contents: write
jobs:
  Report-Status:
    runs-on: ubuntu-latest
    concurrency:
      group: slocReport-${{ github.ref }}
      cancel-in-progress: true
    env:
      appid: ${{ secrets.DEPLOY_APP_ID }}
    steps:
      - name: Generate app token
        if: ${{ env.appid != '' }}
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 1
          token: ${{ steps.generate-token.outputs.token || secrets.GITHUB_TOKEN }}
      - run: echo "The ${{ github.repository }} repository has been cloned to the runner."
      - name: "Set environmental variables"
        run: |
          echo "GALACTICUS_EXEC_PATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
      - name: Install tools
        run: |
          sudo apt -y update
          sudo apt install -y sloccount
      - name: Retrieve and report status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          SLACK_WEBHOOK_SLOCREPORT_URL: ${{ secrets.SLACK_WEBHOOK_SLOCREPORT_URL }}
        run: |
          cd $GALACTICUS_EXEC_PATH
          git config --global --add safe.directory $GALACTICUS_EXEC_PATH
          ./scripts/aux/slocReport.py
      - name: Commit updated history file
        if: ${{ success() && github.ref == 'refs/heads/master' && env.appid != '' }}
        run: |
          cd $GALACTICUS_EXEC_PATH
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/metrics/slocHistory.json
          if git diff --cached --quiet; then
            echo "No history change; skipping commit."
            exit 0
          fi
          git commit -m "chore: update SLOC history for $(date -u +%Y-%m-%d) [skip ci]"
          git push origin HEAD:master
