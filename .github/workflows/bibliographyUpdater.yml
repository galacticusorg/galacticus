name: bibliographyUpdater
on:
  schedule:
    # Daily preprint-upgrade run.
    - cron:  '06 08 * * *'
    # Monthly aggressive refresh: re-query every entry with a discoverable ADS
    # bibcode and update if its published metadata has changed.
    - cron:  '06 09 1 * *'
  push:
    branches:
      - 'master'
    paths:
      - 'doc/Galacticus.bib'
  workflow_dispatch:
    inputs:
      refresh-all:
        description: 'Refresh metadata for every ADS-discoverable entry (not just arXiv preprints).'
        required: false
        default: false
        type: boolean
defaults:
  run:
    shell: bash
jobs:
  Update-Bibliography:
    runs-on: ubuntu-latest
    env:
      appid: ${{ secrets.DEPLOY_APP_ID }}
      adstoken: ${{ secrets.NASA_ADS_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/create-github-app-token@v3
        if: ${{ env.appid != '' }}
        id: generate-token
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
      - name: "Set environmental variables"
        run: |
          echo "GALACTICUS_EXEC_PATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
      - name: "Determine refresh mode"
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "${{ github.event.schedule }}" == "06 09 1 * *" ]]; then
            echo "refresh_all=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.inputs.refresh-all }}" == "true" ]]; then
            echo "refresh_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "refresh_all=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Update the bibliography
        if: ${{ env.adstoken != '' }}
        run: |
          flags=()
          if [[ "${{ steps.mode.outputs.refresh_all }}" == "true" ]]; then
            flags+=(--refresh-all)
          fi
          python3 scripts/aux/bibliographyUpdate.py "${flags[@]}" --summary bibliographyChanges.md "${{ secrets.NASA_ADS_API_TOKEN }}"
      - name: "Build PR body"
        if: ${{ ( env.appid != '' ) && ( env.adstoken != '' ) }}
        id: pr-body
        run: |
          {
            echo 'body<<__PR_BODY_EOF__'
            if [[ -s bibliographyChanges.md ]]; then
              cat bibliographyChanges.md
            else
              echo "No changes detected."
            fi
            echo
            echo "Mode: \`${{ steps.mode.outputs.refresh_all == 'true' && 'refresh-all' || 'preprint-upgrade' }}\`."
            echo
            echo "This PR is auto generated by [bibliographyUpdater](https://github.com/${{ github.repository }}/actions?query=workflow%3A${{ github.workflow }})."
            echo '__PR_BODY_EOF__'
          } >> "$GITHUB_OUTPUT"
      - name: Create Pull Request
        if: ${{ ( env.appid != '' ) && ( env.adstoken != '' ) }}
        uses: peter-evans/create-pull-request@v8
        with:
          title: "${{ steps.mode.outputs.refresh_all == 'true' && 'fix: Refresh bibliography metadata' || 'fix: Update bibliography records' }}"
          commit-message: "${{ steps.mode.outputs.refresh_all == 'true' && 'fix: Refresh bibliography metadata' || 'fix: Update bibliography records' }}"
          body: "${{ steps.pr-body.outputs.body }}"
          branch: "${{ steps.mode.outputs.refresh_all == 'true' && 'update/bibliography-refresh' || 'update/bibliography' }}"
          assignees: abensonca
          token: ${{ steps.generate-token.outputs.token }}
