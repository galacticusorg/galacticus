name: 'PR-Checks'
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - master
concurrency:
  group: prCheck-${{ github.ref }}
  cancel-in-progress: true  
defaults:
  run:
    shell: bash
jobs:
  # Validate YAML
  Validate-YAML:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Set environmental variables"
        run: |
          echo "GALACTICUS_EXEC_PATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
      - name: Mark directory safe        
        run: |
          git config --global --add safe.directory $GALACTICUS_EXEC_PATH
      - name: Install tools
        run: |
          sudo apt -y update
          sudo apt install -y yamllint
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.yml
      - name: Validate any YAML files
        run: |
          status=0
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if yamllint $file; then
              echo "YAML $file is valid"
            else
              echo "YAML $file is invalid"
              status=1
            fi
          done
          exit $status
  # Validate XML
  Validate-XML:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Set environmental variables"
        run: |
          echo "GALACTICUS_EXEC_PATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
      - name: Mark directory safe        
        run: |
          git config --global --add safe.directory $GALACTICUS_EXEC_PATH
      - name: Install tools
        run: |
          sudo apt -y update
          sudo apt install -y libxml2-utils
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.xml
      - name: Validate any XML files
        run: |
          status=0
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "Validating XML file: $file"
            if xmllint --noout $file; then
              echo "XML $file is valid"
            else
              echo "XML $file is invalid"
              status=1
            fi
          done
          exit $status
  # Validate Python scripts
  Validate-Python-Scripts:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    container: ghcr.io/galacticusorg/buildenv:latest
    steps:
      - uses: actions/checkout@v6
      - name: "Set environmental variables"
        run: |
          echo "GALACTICUS_EXEC_PATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
      - name: Mark directory safe
        run: |
          git config --global --add safe.directory $GALACTICUS_EXEC_PATH
      - name: Get changed scripts
        id: changed-scripts
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.py
      - name: Validate any Python scripts
        run: |
          status=0
          for file in ${{ steps.changed-scripts.outputs.all_changed_files }}; do
            if python3 -m py_compile $file; then
              echo "Python script $file compiles correctly"
            else
              echo "Python script $file fails to compile"
              status=1
            fi
          done
          exit $status
  # Embedded docstrings must be reStructuredText (not the old LaTeX form).
  Validate-Docstrings-RST:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    container: ghcr.io/galacticusorg/buildenv:latest
    steps:
      - uses: actions/checkout@v6
      - name: "Set environmental variables"
        run: |
          echo "GALACTICUS_EXEC_PATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
      - name: Mark directory safe
        run: |
          git config --global --add safe.directory $GALACTICUS_EXEC_PATH
      - name: Check embedded docstrings are reStructuredText
        run: |
          python3 scripts/doc/convertDocstringsToRST.py --check source
  # Fortran static analysis
  Fortran-Static-Analysis:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    container: ghcr.io/galacticusorg/buildenv:latest
    steps:
      - uses: actions/checkout@v6
      - name: "Set environmental variables"
        run: |
          echo "GALACTICUS_EXEC_PATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
      - name: Mark directory safe        
        run: |
          git config --global --add safe.directory $GALACTICUS_EXEC_PATH
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.F90
      - name: Perform static analysis on Fortran files
        run: |
          status=0
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if PYTHONPATH=$GITHUB_WORKSPACE/python python3 scripts/aux/staticAnalyzer.py $file; then
              echo "Fortran file $file passes analysis"
            else
              echo "Fortran file $file fails analysis"
              status=1
            fi
          done
          exit $status
  # Embedded XML directive validation (the LaTeX checks were retired with the
  # migration of the embedded documentation to reStructuredText).
  Validate-Embedded-XML:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    container: ghcr.io/galacticusorg/buildenv:latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: "Set environmental variables"
        run: |
          echo "GALACTICUS_EXEC_PATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "PYTHONPATH=$GITHUB_WORKSPACE/python" >> $GITHUB_ENV
      - name: Mark directory safe
        run: |
          git config --global --add safe.directory $GALACTICUS_EXEC_PATH
      - name: Install tools
        run: |
          apt -y update
          apt install -y python3-lxml
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.F90
            **/*.Inc
      - name: Validate embedded XML directives
        run: |
          status=0
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if PYTHONPATH=$GITHUB_WORKSPACE/python python3 scripts/aux/embeddedAnalyzer.py $file warnings.md; then
              echo "Embedded XML in file $file passes validation"
            else
              echo "Embedded XML in file $file fails validation"
              status=1
            fi
          done
          exit $status
  # Spell check LaTeX files
  Spell-Check-LaTeX:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    container: ghcr.io/galacticusorg/buildenv:latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: "Set environmental variables"
        run: |
          echo "GALACTICUS_EXEC_PATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "DICTIONARY=en_US" >> $GITHUB_ENV
          echo "PYTHONPATH=$GITHUB_WORKSPACE/python" >> $GITHUB_ENV
      - name: Mark directory safe        
        run: |
          git config --global --add safe.directory $GALACTICUS_EXEC_PATH
      - name: Install tools
        run: |
          apt -y update
          apt install -y texlive texlive-latex-extra texlive-science texlive-extra-utils hunspell hunspell-en-us python3-lxml
      - name: Build class information
        run: |
          cd $GALACTICUS_EXEC_PATH
          make -j4 work/build/stateStorables.xml
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.tex
      - name: Perform checks of LaTeX files
        run: |
          status=0
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            PYTHONPATH=$GITHUB_WORKSPACE/python python3 scripts/aux/spellChecker.py $file warnings.md
          done
      - name: Check file existence
        id: check_files
        uses: andstor/file-existence-action@v3
        with:
          files: warnings.md
      - name: Wrap warnings in collapsible section
        if: steps.check_files.outputs.files_exists == 'true'
        run: |
          printf '<details><summary>Spell check warnings (click to expand)</summary>\n\n' > warnings-collapsible.md
          cat warnings.md >> warnings-collapsible.md
          printf '\n\n</details>\n' >> warnings-collapsible.md
      - name: Comment on the PR if any warnings were found
        if: steps.check_files.outputs.files_exists == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: warnings-collapsible.md
