# ReadTheDocs build configuration for Galacticus.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages:
    # pdftocairo, used to rasterise the figure PDFs to PNG (extractDocsRST.py).
    - poppler-utils
  commands:
    # Install the documentation toolchain.
    - pip install -r docs/requirements.txt
    # Generate the physics pages, glossary and references from the RST
    # docstrings embedded in the Fortran source (no compilation required).
    - PYTHONPATH=python python scripts/doc/extractDocsRST.py source docs
    # Build the HTML site.
    - python -m sphinx -b html docs $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/conf.py
